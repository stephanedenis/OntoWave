<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OntoWave - Test CORS</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    #app {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      min-height: 500px;
    }
    h1 { color: #2563eb; }
    .loading { color: #666; font-style: italic; }
    .error { color: #dc2626; background: #fee; padding: 15px; border-radius: 4px; }
    .success { color: #16a34a; background: #f0fdf4; padding: 15px; border-radius: 4px; }
    pre { background: #f8fafc; padding: 15px; border-radius: 4px; overflow-x: auto; }
    .nav { margin: 20px 0; }
    .nav a {
      display: inline-block;
      padding: 10px 20px;
      margin-right: 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .nav a:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div id="app">
    <h1>🌊 OntoWave - Test CORS</h1>
    <p class="loading">Chargement...</p>
    
    <div class="nav">
      <a href="#index.md">🏠 Accueil</a>
      <a href="#@external-api/api-guide.md">📡 API Guide (Externe)</a>
      <a href="#@external-api/webhooks.md">🔔 Webhooks (Externe)</a>
      <a href="#@external-api/advanced/rate-limiting.md">⚡ Rate Limiting (Externe)</a>
    </div>
  </div>
  
  <script id="ontowave-config" type="application/json">
    {
      "roots": [
        { "base": "fr", "root": "/tests" },
        { "base": "en", "root": "/tests" }
      ],
      "externalDataSources": [
        {
          "name": "external-api",
          "baseUrl": "http://localhost:8011",
          "corsEnabled": true
        }
      ]
    }
  </script>
  
  <script src="/src/main.ts" type="module"></script>
</body>
</html>
