name: 🧪 Regression Tests

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    # Tous les jours à 2h UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ===== TESTS STRUCTURELS =====
  structural-tests:
    name: 🏗️ Tests Structurels
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: ✅ Tests Protection docs/
        run: npm run test -- tests/protect-docs.test.ts
      
      - name: 🔍 Validation vite.config.ts
        run: |
          if grep -q 'outDir.*docs' vite.config.ts; then
            echo "❌ RÉGRESSION: vite.config.ts pointe vers docs/"
            exit 1
          fi
          echo "✅ vite.config.ts correct"
      
      - name: 🔍 Validation .gitignore
        run: |
          if ! grep -q 'public-demo/' .gitignore; then
            echo "❌ RÉGRESSION: public-demo/ manquant dans .gitignore"
            exit 1
          fi
          echo "✅ .gitignore correct"
      
      - name: 📊 Rapport Tests Structurels
        if: always()
        run: |
          echo "# 🏗️ Tests Structurels" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Protection docs/" >> $GITHUB_STEP_SUMMARY
          echo "✅ Configuration Vite" >> $GITHUB_STEP_SUMMARY
          echo "✅ Configuration Git" >> $GITHUB_STEP_SUMMARY

  # ===== TESTS FONCTIONNELS =====
  functional-tests:
    name: 🧪 Tests Fonctionnels
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: ✅ Lint
        run: npm run lint
      
      - name: ✅ Type Check
        run: npm run type-check
      
      - name: 🧪 Unit Tests
        run: npm test
      
      - name: 📊 Rapport Tests Fonctionnels
        if: always()
        run: |
          echo "# 🧪 Tests Fonctionnels" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lint" >> $GITHUB_STEP_SUMMARY
          echo "✅ Type Check" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit Tests" >> $GITHUB_STEP_SUMMARY

  # ===== TESTS DE BUILD =====
  build-tests:
    name: 🏗️ Tests de Build
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: 🏗️ Build NPM
        run: npm run build:npm
      
      - name: 🔍 Validation Build Output
        run: |
          echo "🔍 Vérification outputs de build..."
          
          # Vérifier dist/
          test -f dist/ontowave.js || { echo "❌ dist/ontowave.js manquant"; exit 1; }
          test -f dist/ontowave.min.js || { echo "❌ dist/ontowave.min.js manquant"; exit 1; }
          
          # Vérifier que docs/ n'a PAS été écrasé
          test -f docs/index.html || { echo "❌ RÉGRESSION: docs/index.html supprimé!"; exit 1; }
          grep -q "window.ontoWaveConfig" docs/index.html || { 
            echo "❌ RÉGRESSION: Configuration dogfooding perdue!"; 
            exit 1; 
          }
          
          echo "✅ Build validé sans régression"
      
      - name: 📏 Validation Taille Bundles
        run: |
          MAIN_SIZE=$(stat -f%z dist/ontowave.js 2>/dev/null || stat -c%s dist/ontowave.js)
          MIN_SIZE=$(stat -f%z dist/ontowave.min.js 2>/dev/null || stat -c%s dist/ontowave.min.js)
          
          echo "📊 ontowave.js: $MAIN_SIZE bytes"
          echo "📊 ontowave.min.js: $MIN_SIZE bytes"
          
          # Limites
          if [ $MAIN_SIZE -gt 204800 ]; then
            echo "⚠️ RÉGRESSION: Bundle trop gros: $MAIN_SIZE bytes"
            exit 1
          fi
          
          if [ $MIN_SIZE -gt 102400 ]; then
            echo "⚠️ RÉGRESSION: Bundle minifié trop gros: $MIN_SIZE bytes"
            exit 1
          fi
          
          echo "✅ Tailles acceptables"
      
      - name: 📊 Rapport Tests Build
        if: always()
        run: |
          echo "# 🏗️ Tests de Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build NPM réussi" >> $GITHUB_STEP_SUMMARY
          echo "✅ Outputs validés" >> $GITHUB_STEP_SUMMARY
          echo "✅ docs/ préservé (pas de régression)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tailles bundles OK" >> $GITHUB_STEP_SUMMARY

  # ===== TESTS E2E =====
  e2e-tests:
    name: 🎭 Tests E2E
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps chromium
      
      - name: 🚀 Start Test Server
        run: |
          cd docs
          python3 -m http.server 8020 &
          sleep 2
          echo "✅ Server started"
      
      - name: 🧪 Run E2E Tests
        run: |
          npx playwright test tests/e2e/production-deployment.spec.cjs \
            --project=chromium \
            --config=playwright.production.config.js \
            --timeout=60000 \
            --grep "Configuration|Sources externes"
        continue-on-error: true
      
      - name: 📸 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 7
      
      - name: 📊 Rapport Tests E2E
        if: always()
        run: |
          echo "# 🎭 Tests E2E" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests exécutés sur docs/ déployé localement" >> $GITHUB_STEP_SUMMARY

  # ===== TESTS DE SÉCURITÉ =====
  security-tests:
    name: 🔐 Tests de Sécurité
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📚 Install Dependencies
        run: npm ci
      
      - name: 🔐 npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
      
      - name: 🔍 Check Hardcoded Secrets
        run: |
          echo "🔍 Recherche de credentials hardcodés..."
          
          if grep -r "password\|secret\|api_key\|token" docs/*.html 2>/dev/null; then
            echo "⚠️ Credentials potentiels détectés dans docs/"
            exit 1
          fi
          
          echo "✅ Pas de credentials hardcodés"
      
      - name: 📊 Rapport Sécurité
        if: always()
        run: |
          echo "# 🔐 Tests de Sécurité" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ npm audit" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pas de credentials hardcodés" >> $GITHUB_STEP_SUMMARY

  # ===== RAPPORT FINAL =====
  report:
    name: 📊 Rapport Final
    runs-on: ubuntu-latest
    needs: [structural-tests, functional-tests, build-tests, e2e-tests, security-tests]
    if: always()
    
    steps:
      - name: 📊 Generate Report
        run: |
          echo "# 📊 Rapport de Tests de Régression" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Résultats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Tests Structurels: ${{ needs.structural-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Tests Fonctionnels: ${{ needs.functional-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Tests de Build: ${{ needs.build-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🎭 Tests E2E: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Tests de Sécurité: ${{ needs.security-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🕐 Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "📝 Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
