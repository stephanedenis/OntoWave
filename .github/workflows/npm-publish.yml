name: NPM Publish

# Stratégie de tags npm :
#   @latest  — fix/*, chore/*  → patch bump  (ex: 1.0.45 → 1.0.46) — production stable
#   @preview — feat/*          → minor+pre   (ex: 1.0.45 → 1.1.0-preview.1) — fonctionnalités récentes

on:
  # Déclenché sur push dans main (= après merge d'une PR).
  # Le trigger push expose les secrets du repo de manière sûre, contrairement à
  # pull_request_target qui est vulnérable au "pwn request" (CodeQL critical).
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version exacte à publier (ex: 1.2.0 ou 1.2.0-preview.3)'
        required: true
      npm_tag:
        description: 'Tag npm'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - preview

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Validate NPM token availability
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [[ -z "${{ secrets.NPM_TOKEN }}" ]]; then
            echo "::error::NPM_TOKEN secret is not available in this workflow context."
            echo "::error::Configurez le secret NPM_TOKEN dans les paramètres du repo GitHub."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Determine version and npm tag
        run: |
          git fetch --tags

          pick_higher_version() {
            printf '%s\n%s\n' "$1" "$2" | sort -V | tail -n 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
            NPM_TAG="${{ github.event.inputs.npm_tag }}"
          else
            # Extraire le nom de la branche source depuis le message du commit de merge.
            # Merge commit standard : "Merge pull request #N from owner/feat/branch-name"
            # Squash merge : titre de la PR (peut contenir feat:, fix:, chore:)
            MERGE_MSG=$(git log -1 --format="%s")
            if echo "$MERGE_MSG" | grep -qiE '(feat/|^feat:)'; then
              BRANCH="feat/auto"
            else
              BRANCH="fix/auto"
            fi
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            VERSION=${LAST_TAG#v}
            NPM_LATEST=$(npm view ontowave version 2>/dev/null || echo "0.0.0")
            BASE_VERSION=$(pick_higher_version "$VERSION" "$NPM_LATEST")
            MAJOR="${BASE_VERSION%%.*}"
            MINOR_PATCH="${BASE_VERSION#*.}"
            MINOR="${MINOR_PATCH%%.*}"
            PATCH="${MINOR_PATCH##*.}"
            if [[ "$BRANCH" == feat/* ]]; then
              # Fonctionnalité → @preview (minor bump + prerelease)
              NEW_MINOR=$((MINOR + 1))
              PREVIEW_TAG_COUNT=$(git tag --list "v${MAJOR}.${NEW_MINOR}.0-preview.*" | wc -l | tr -d ' ')
              PREVIEW_NPM_COUNT=$(node -e "const { execSync } = require('node:child_process'); try { const raw = execSync('npm view ontowave versions --json', { stdio: ['ignore', 'pipe', 'ignore'] }).toString(); const versions = JSON.parse(raw); const list = Array.isArray(versions) ? versions : [versions]; const re = new RegExp('^${MAJOR}\\.${NEW_MINOR}\\.0-preview\\.\\d+$'); process.stdout.write(String(list.filter((v) => re.test(v)).length)); } catch { process.stdout.write('0'); }")
              PREVIEW_COUNT=$(( PREVIEW_TAG_COUNT > PREVIEW_NPM_COUNT ? PREVIEW_TAG_COUNT : PREVIEW_NPM_COUNT ))
              NEW_VERSION="${MAJOR}.${NEW_MINOR}.0-preview.$((PREVIEW_COUNT + 1))"
              NPM_TAG="preview"
            else
              # Fix / chore → @latest (patch bump)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              NPM_TAG="latest"
            fi
          fi
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          echo "NPM_TAG=${NPM_TAG}" >> $GITHUB_ENV
          # Bump package.json AVANT le build (APP_VERSION est lu au build time)
          npm version "${NEW_VERSION}" --no-git-tag-version
          echo "✅ Publish: v${NEW_VERSION} → npm @${NPM_TAG}"

      - name: Build package
        # APP_VERSION dans le bundle reflète la nouvelle version
        run: npm run build:package

      - name: Publish to NPM
        run: npm publish --tag ${{ env.NPM_TAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json package-lock.json dist/ontowave.js dist/ontowave.min.js docs/ontowave.min.js
          git diff --cached --quiet || git commit -m "chore: bump version to v${{ env.NEW_VERSION }} [skip ci]"
          git push origin HEAD:main

      - name: Create and push release tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag "v${{ env.NEW_VERSION }}" -m "Release v${{ env.NEW_VERSION }} (@${{ env.NPM_TAG }})"
          git push origin "v${{ env.NEW_VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NEW_VERSION }}"
          name: "OntoWave v${{ env.NEW_VERSION }}"
          prerelease: ${{ env.NPM_TAG == 'preview' }}
          generate_release_notes: true
          body: |
            **Tag npm** : `@${{ env.NPM_TAG }}`

            ### Installation
            ```bash
            # Production stable
            npm install ontowave@latest

            # Preview (fonctionnalités récentes, non-éprouvées)
            npm install ontowave@preview
            ```

            ### CDN — version épinglée
            ```html
            <script src="https://cdn.jsdelivr.net/npm/ontowave@${{ env.NEW_VERSION }}/dist/ontowave.min.js"></script>
            ```

            ### CDN — dernier stable
            ```html
            <script src="https://unpkg.com/ontowave/dist/ontowave.min.js"></script>
            ```
