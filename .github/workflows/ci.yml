name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Generate sitemap
        run: npm run sitemap
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test:ci
      - name: Build
        run: npm run build:package
      - name: Vérifier la taille du noyau (gate CI — roadmap.fr.md §1)
        run: node tools/check-dist-size.mjs
      - name: Vérifier la présence des extensions
        run: |
          if [ -f dist/extensions/markdown.js ]; then
            echo "✅ dist/extensions/markdown.js présent ($(du -h dist/extensions/markdown.js | cut -f1))"
          else
            echo "❌ dist/extensions/markdown.js absent"
            exit 1
          fi
          if [ -f dist/extensions/mermaid.js ]; then
            echo "✅ dist/extensions/mermaid.js présent ($(du -h dist/extensions/mermaid.js | cut -f1))"
          else
            echo "❌ dist/extensions/mermaid.js absent"
            exit 1
          fi
      - name: Install fonts for consistent rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-roboto
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: npx playwright test --config playwright.config.ts --update-snapshots
      - name: Upload Playwright test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
      - name: Verify docs/index.html is CDN (not SPA)
        run: |
          if grep -q 'ontowave.min.js' docs/index.html; then
            echo "✅ docs/index.html utilise bien ontowave.min.js (CDN)"
          else
            echo "❌ docs/index.html ne référence pas ontowave.min.js — régression détectée !"
            exit 1
          fi
      - name: List docs output
        run: ls -la docs | head -n 100
