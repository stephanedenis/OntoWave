name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Generate sitemap
        run: npm run sitemap
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run type-check
      - name: Test
        run: npm run test:ci
      - name: Build
        run: npm run build:package
      - name: Verify docs/index.html is CDN (not SPA)
        run: |
          if grep -q 'ontowave.min.js' docs/index.html; then
            echo "✅ docs/index.html utilise bien ontowave.min.js (CDN)"
          else
            echo "❌ docs/index.html ne référence pas ontowave.min.js — régression détectée !"
            exit 1
          fi
      - name: List docs output
        run: ls -la docs | head -n 100
