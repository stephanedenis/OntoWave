<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave - Test CORS GitHub Direct</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        #app {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 500px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>🌊 OntoWave - Test CORS GitHub</h1>
        <p class="loading">Chargement du README.md depuis GitHub...</p>
    </div>
    
    <script>
    // Configuration pour tester le chargement depuis GitHub
    window.ontoWaveConfig = {
        externalDataSources: [
            {
                name: "github-ontowave",
                baseUrl: "https://raw.githubusercontent.com/stephanedenis/OntoWave/main",
                corsEnabled: true
            }
        ],
        
        // Charger le README depuis GitHub (qui existe sur main)
        sources: {
            fr: "@github-ontowave/README.md"
        },
        
        ui: {
            menu: true,
            header: true,
            sidebar: true,
            toc: true
        },
        
        defaultLocale: "fr",
        enablePrism: true,
        enableMermaid: true,
        enablePlantUML: true
    };
    </script>
    
    <!-- OntoWave - utiliser le module ES6 depuis le build Vite -->
    <script type="module">
        import '/assets/index-Cm1od528.js';
    </script>
</body>
</html>
