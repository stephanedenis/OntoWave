<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Export PDF</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/ontowave@latest/dist/ontowave.min.js"></script>
    <script src="/ontowave-ux.js"></script>
    <script>
        window.ontoWaveConfig = {
            baseUrl: "/demos/03-ux/",
            locales: ["fr", "en"],
            defaultLocale: "fr",
            sources: {
                fr: "print.fr.md",
                en: "print.en.md"
            },
            enablePrism: true
        };
    </script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
<h1>Export PDF</h1>
<p>OntoWave optimise le rendu pour l'impression PDF. Utilisez <kbd>Ctrl+P</kbd> ou le menu d'impression du navigateur pour exporter la page en PDF.</p>
<h2>Optimisations d'impression</h2>
<ul>
<li>Masquage des éléments de navigation (menu, sidebar, TOC)</li>
<li>Fond blanc, texte noir, police serif</li>
<li>Marges de 2 cm</li>
<li>Saut de page évité après les titres</li>
</ul>
  </div>
  <div lang="en">
<h1>PDF Export</h1>
<p>OntoWave optimizes rendering for PDF printing. Use <kbd>Ctrl+P</kbd> or the browser print menu to export the page as PDF.</p>
<h2>Print Optimizations</h2>
<ul>
<li>Navigation elements hidden (menu, sidebar, TOC)</li>
<li>White background, black text, serif font</li>
<li>2 cm margins</li>
<li>Page break avoided after headings</li>
</ul>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
