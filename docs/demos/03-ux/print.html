    <script>

  <div lang="fr">
<h1>Export PDF et impression</h1>
<p>OntoWave inclut un CSS d’impression optimisé pour produire des PDF propres depuis
n’importe quel navigateur. Le bouton <strong>🖨</strong> dans la barre UX déclenche <code>window.print()</code>.</p>
<h2>Éléments masqués à l’impression</h2>
<p>Les éléments suivants sont automatiquement masqués (<code>display: none</code>) :</p>
<table>
<thead>
<tr>
<th>Sélecteur</th>
<th>Élément masqué</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>#sidebar</code></td>
<td>Barre latérale de navigation</td>
</tr>
<tr>
<td><code>#toc</code></td>
<td>Table des matières</td>
</tr>
<tr>
<td><code>#site-header</code></td>
<td>En-tête du site</td>
</tr>
<tr>
<td><code>#floating-menu</code></td>
<td>Menu flottant</td>
</tr>
<tr>
<td><code>.ow-ux-toolbar</code></td>
<td>Barre d’outils UX (thème, notes, impression)</td>
</tr>
<tr>
<td><code>.ow-notes-panel</code></td>
<td>Panneau de notes</td>
</tr>
</tbody>
</table>
<h2>Styles d’impression appliqués</h2>
<pre><code class="language-css">@media print {
  body {
    background: white;
    color: black;
    font-size: 12pt;
    line-height: 1.5;
  }

  a[href]::after {
    content: &quot; (&quot; attr(href) &quot;)&quot;;
    font-size: 10pt;
    color: #555;
  }

  pre, code {
    border: 1px solid #ccc;
    background: #f8f8f8;
  }

  h1, h2, h3 {
    page-break-after: avoid;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  td, th {
    border: 1px solid #999;
    padding: 4pt 8pt;
  }
}
</code></pre>
<h2>Exemple de rendu imprimable</h2>
<p>Le contenu ci-dessous illustre la qualité d’impression :</p>
<h3>Tableau de données</h3>
<table>
<thead>
<tr>
<th>Propriété</th>
<th>Type</th>
<th>Valeur par défaut</th>
<th>Description</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>themes</code></td>
<td><code>boolean</code></td>
<td><code>true</code></td>
<td>Active les thèmes de lecture</td>
</tr>
<tr>
<td><code>keyboard</code></td>
<td><code>boolean</code></td>
<td><code>true</code></td>
<td>Active les raccourcis clavier</td>
</tr>
<tr>
<td><code>notes</code></td>
<td><code>boolean</code></td>
<td><code>true</code></td>
<td>Active le panneau de notes</td>
</tr>
<tr>
<td><code>prefetch</code></td>
<td><code>boolean</code></td>
<td><code>true</code></td>
<td>Préchargement Markov des pages</td>
</tr>
</tbody>
</table>
<h3>Exemple de code</h3>
<pre><code class="language-typescript">// Initialiser le module UX
initUx({
  themes: true,
  keyboard: true,
  notes: true,
  prefetch: true
});
</code></pre>

<h2>Déclenchement manuel</h2>
<pre><code class="language-javascript">// Équivalent au bouton 🖨
window.print();
</code></pre>
<h2>Configuration</h2>
<p>Le bouton d’impression fait partie de la barre UX standard. Il est disponible dès que
<code>ux: true</code> est présent dans la configuration.</p>
<pre><code class="language-json">{
  &quot;ux&quot;: true
}
</code></pre>

The <strong>🖨</strong> button in the UX toolbar triggers <code>window.print()</code>.</p>

<p>The following elements are automatically hidden (<code>display: none</code>):</p>

</tr>
<tr>

<td>Table of contents</td>
</tr>
<tr>

<tr>

</tr>
<tr>

<td>Notes panel</td>
</tr>
</tbody>
</table>
<h2>Applied Print Styles</h2>
<pre><code class="language-css">@media print {
  body {
    background: white;
