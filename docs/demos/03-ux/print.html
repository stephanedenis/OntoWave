<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Export PDF / Impression</title>
    <script>
        window.__ONTOWAVE_BUNDLE__ = {
            '/config.json': JSON.stringify({
                roots: [
                    { base: 'fr', root: '/demos/03-ux' },
                    { base: 'en', root: '/demos/03-ux' }
                ],
                i18n: { default: 'fr', supported: ['fr', 'en'] },
                ux: true
            }),
            '/nav.yml': '[]',
            '/sitemap.json': '{"items":[]}',
            '/search-index.json': '[]'
        };
        if (!location.hash || location.hash === '#/' || location.hash === '#') {
            location.hash = '#fr/print';
        }
    </script>
</head>
<body>
    <div id="app"></div>
    <script src="/ontowave.min.js"></script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
    <h1>Export PDF / Impression — OntoWave</h1>
    <p>OntoWave fournit un CSS d'impression qui masque l'interface de navigation et formate
    le contenu pour l'impression papier ou l'export PDF via le bouton 🖨 de la barre UX.
    Activez JavaScript pour tester la fonctionnalité.</p>
  </div>
  <div lang="en">
    <h1>PDF Export / Print — OntoWave</h1>
    <p>OntoWave provides print CSS that hides the navigation interface and formats
    the content for paper printing or PDF export via the 🖨 button in the UX toolbar.
    Enable JavaScript to test this feature.</p>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
