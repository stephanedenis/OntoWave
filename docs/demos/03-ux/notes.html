    <script>
        window.__ONTOWAVE_BUNDLE__ = {

            }),
            '/nav.yml': '[]',

<noscript>
  <div lang="fr">
<h1>Notes persistantes</h1>
<p>OntoWave permet de prendre des notes textuelles associées à chaque page.
Les notes sont sauvegardées automatiquement dans le <code>localStorage</code> du navigateur.</p>
<p>Cliquez sur le bouton <strong>📝 Notes</strong> dans la barre UX pour ouvrir le panneau.</p>
<h2>Fonctionnement</h2>
<ul>
<li><strong>Une note par page</strong> : chaque route (<code>/demos/03-ux/notes</code>, <code>/demos/03-ux/themes</code>…) possède sa propre note</li>
<li><strong>Sauvegarde automatique</strong> : un délai de 600 ms après la dernière frappe déclenche la sauvegarde (debounce)</li>
<li><strong>Persistance sur la session et au-delà</strong> : les notes survivent aux rechargements et fermetures du navigateur</li>
<li><strong>Panneau masqué à l’impression</strong> : le bloc <code>.ow-notes-panel</code> est exclu de l’impression PDF</li>
</ul>
<h2>Clé de stockage</h2>
<pre><code class="language-javascript">// Format de la clé localStorage
`ow-note:${route}`

// Exemples
'ow-note:/demos/03-ux/notes'
'ow-note:/demos/03-ux/themes'
</code></pre>
<h2>API JavaScript</h2>
<pre><code class="language-typescript">// Sauvegarder une note pour la route courante
ontowave.ux.saveNote('/demos/03-ux/notes', 'Mon contenu de note…');

// Lire la note d'une route
const texte = ontowave.ux.loadNote('/demos/03-ux/notes');

// Récupérer toutes les notes (toutes pages)
const toutes = ontowave.ux.getAllNotes();
// Retourne : Array&lt;{ route: string, text: string }&gt;
</code></pre>
<h2>Exemple : lister toutes les notes</h2>
<pre><code class="language-javascript">const notes = ontowave.ux.getAllNotes();

if (notes.length === 0) {
  console.log('Aucune note enregistrée.');
} else {
  notes.forEach(({ route, text }) =&gt; {
    console.log(`{text.slice(0, 80)}…`);
  });
}
</code></pre>
<h2>Effacer une note</h2>
<pre><code class="language-javascript">// Effacer la note de la page courante
ontowave.ux.saveNote(location.pathname, '');

// Effacer toutes les notes (nettoyage complet)
Object.keys(localStorage)
  .filter(key =&gt; key.startsWith('ow-note:'))
  .forEach(key =&gt; localStorage.removeItem(key));
</code></pre>
<h2>Configuration</h2>
<pre><code class="language-json">{
  &quot;ux&quot;: true
}
</code></pre>
<p>Ou, pour activer uniquement les notes :</p>
<pre><code class="language-json">{
  &quot;ux&quot;: { &quot;notes&quot;: true }
}
</code></pre>
<h2>Démo interactive</h2>
<p>Le panneau de notes de <strong>cette page</strong> est actif. Ouvrez-le avec le bouton 📝, saisissez
du texte, puis rechargez la page : votre note sera toujours là.</p>
<blockquote>
<p><strong>Vie privée</strong> : les notes ne quittent jamais votre navigateur. Elles sont stockées
uniquement en local et ne sont jamais envoyées vers un serveur.</p>
</blockquote>
<hr>

  <div lang="en">
<h1>Persistent Notes</h1>
<p>OntoWave lets you take text notes associated with each page.
Notes are automatically saved to the browser’s <code>localStorage</code>.</p>
<p>Click the <strong>📝 Notes</strong> button in the UX toolbar to open the notes panel.</p>
<h2>How It Works</h2>
<ul>
<li><strong>One note per page</strong>: each route (<code>/demos/03-ux/notes</code>, <code>/demos/03-ux/themes</code>…) has its own note</li>
<li><strong>Auto-save</strong>: a 600 ms debounce delay after the last keypress triggers saving</li>
<li><strong>Persistent</strong>: notes survive page reloads and browser restarts</li>
<li><strong>Hidden when printing</strong>: the <code>.ow-notes-panel</code> element is excluded from PDF print</li>
</ul>
<h2>Storage Key</h2>
<pre><code class="language-javascript">// localStorage key format
`ow-note:${route}`

// Examples
'ow-note:/demos/03-ux/notes'
'ow-note:/demos/03-ux/themes'
</code></pre>
<h2>JavaScript API</h2>
<pre><code class="language-typescript">// Save a note for the current route
ontowave.ux.saveNote('/demos/03-ux/notes', 'My note content…');

// Read the note for a route
const text = ontowave.ux.loadNote('/demos/03-ux/notes');

// Get all notes (all pages)
const all = ontowave.ux.getAllNotes();
// Returns: Array&lt;{ route: string, text: string }&gt;
</code></pre>
<h2>Example: List All Notes</h2>
<pre><code class="language-javascript">const notes = ontowave.ux.getAllNotes();

if (notes.length === 0) {
  console.log('No notes saved.');
} else {
  notes.forEach(({ route, text }) =&gt; {
    console.log(`{text.slice(0, 80)}…`);
  });
}
</code></pre>
<h2>Clearing Notes</h2>
<pre><code class="language-javascript">// Clear the note for the current page
ontowave.ux.saveNote(location.pathname, '');

// Clear all notes (full cleanup)
Object.keys(localStorage)
  .filter(key =&gt; key.startsWith('ow-note:'))
  .forEach(key =&gt; localStorage.removeItem(key));
</code></pre>
<h2>Configuration</h2>
<pre><code class="language-json">{
  &quot;ux&quot;: true
}
</code></pre>
<p>Or, to enable notes only:</p>
<pre><code class="language-json">{
  &quot;ux&quot;: { &quot;notes&quot;: true }
}
</code></pre>
<h2>Interactive Demo</h2>
<p>The notes panel for <strong>this page</strong> is active. Open it with the 📝 button, type some text,
then reload the page — your note will still be there.</p>
<blockquote>
<p><strong>Privacy</strong>: notes never leave your browser. They are stored locally only and are
never sent to any server.</p>
</blockquote>
