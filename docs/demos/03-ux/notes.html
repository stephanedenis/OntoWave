<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Notes persistantes</title>
    <script>
        window.__ONTOWAVE_BUNDLE__ = {
            '/config.json': JSON.stringify({
                roots: [
                    { base: 'fr', root: '/demos/03-ux' },
                    { base: 'en', root: '/demos/03-ux' }
                ],
                i18n: { default: 'fr', supported: ['fr', 'en'] },
                ux: true
            }),
            '/nav.yml': '[]',
            '/sitemap.json': '{"items":[]}',
            '/search-index.json': '[]'
        };
        if (!location.hash || location.hash === '#/' || location.hash === '#') {
            location.hash = '#fr/notes';
        }
    </script>
</head>
<body>
    <div id="app"></div>
    <script src="/ontowave.min.js"></script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
    <h1>Notes persistantes — OntoWave</h1>
    <p>OntoWave permet de prendre des notes par page, sauvegardées automatiquement dans
    le localStorage. Le bouton 📝 de la barre UX ouvre le panneau de notes.
    Activez JavaScript pour utiliser cette fonctionnalité.</p>
  </div>
  <div lang="en">
    <h1>Persistent Notes — OntoWave</h1>
    <p>OntoWave allows per-page note-taking, automatically saved in localStorage.
    The 📝 button in the UX toolbar opens the notes panel.
    Enable JavaScript to use this feature.</p>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
