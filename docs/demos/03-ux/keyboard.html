<h1>Navigation clavier</h1>
<p>OntoWave installe des raccourcis clavier pour naviguer dans la documentation sans souris.
Testez-les sur cette page : assurez-vous que le focus n’est pas dans un champ de saisie.</p>
<h2>Raccourcis disponibles</h2>
<table>
<thead>
<tr>
<th>Touche</th>
<th>Action</th>
<th>Détail</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>j</code></td>
<td>Défiler vers le bas</td>
<td>+120 px</td>
</tr>
<tr>
<td><code>k</code></td>
<td>Défiler vers le haut</td>
<td>−120 px</td>
</tr>
<tr>
<td><code>n</code></td>
<td>Page suivante</td>
<td>Utilise le lien de navigation “suivant”</td>
</tr>
<tr>
<td><code>p</code></td>
<td>Page précédente</td>
<td>Utilise le lien de navigation “précédent”</td>
</tr>
</tbody>
</table>
<h2>Condition d’activation</h2>
<p>Les touches <code>j</code>, <code>k</code>, <code>n</code>, <code>p</code> sont ignorées si le focus se trouve dans un élément interactif :
<code>&lt;input&gt;</code>, <code>&lt;textarea&gt;</code>, <code>&lt;select&gt;</code>, ou tout élément avec <code>contenteditable</code>.</p>
<p>Cela évite les conflits lors de la saisie de texte.</p>
<h2>Démo interactive</h2>
<p>Appuyez sur <code>j</code> pour faire défiler ce texte vers le bas.
Appuyez sur <code>k</code> pour remonter.</p>
<hr>
<p>Cette page présente suffisamment de contenu pour rendre le défilement sensible.</p>

<h2>Configuration</h2>
<pre><code class="language-json">{
  &quot;ux&quot;: true
}
</code></pre>
<p>Ou, pour activer uniquement la navigation clavier :</p>
<pre><code class="language-json">{
  &quot;ux&quot;: { &quot;keyboard&quot;: true }
}
</code></pre>
<h2>API JavaScript</h2>
<pre><code class="language-typescript">// Installer la navigation clavier manuellement
const cleanup = ontowave.ux.installKeyboardNav(() =&gt; {
  const links = document.querySelectorAll&lt;HTMLAnchorElement&gt;('footer a[href]');

  return {
    prev: links[0]?.getAttribute('href') ?? undefined,
    next: links[1]?.getAttribute('href') ?? undefined
  };
});

// Désinstaller (ex. lors d'un changement de route)
cleanup();
</code></pre>
<p>La fonction passée en paramètre est appelée à chaque appui sur <code>n</code> ou <code>p</code> pour déterminer
dynamiquement les URLs de navigation.</p>
<h2>Intégration avec le routeur OntoWave</h2>
<p>Quand <code>ux: true</code> est défini dans la config, <code>installKeyboardNav</code> est appelé automatiquement
et se synchronise avec le routeur interne de la bibliothèque.</p>

<h1>Keyboard Navigation</h1>
<p>OntoWave installs keyboard shortcuts for navigating documentation without a mouse.
Try them on this page — make sure the focus is not inside an input field.</p>
<h2>Available Shortcuts</h2>
<table>
<thead>
<tr>
<th>Key</th>
<th>Action</th>
<th>Detail</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>j</code></td>
<td>Scroll down</td>
<td>+120 px</td>
</tr>
<tr>
<td><code>k</code></td>
<td>Scroll up</td>
<td>−120 px</td>
</tr>
<tr>
<td><code>n</code></td>
<td>Next page</td>
<td>Uses the “next” navigation link</td>
</tr>
<tr>
<td><code>p</code></td>
<td>Previous page</td>
<td>Uses the “previous” navigation link</td>
</tr>
</tbody>
</table>
<h2>Activation Condition</h2>
<p>The keys <code>j</code>, <code>k</code>, <code>n</code>, <code>p</code> are ignored when the focus is inside an interactive element:
<code>&lt;input&gt;</code>, <code>&lt;textarea&gt;</code>, <code>&lt;select&gt;</code>, or any element with <code>contenteditable</code>.</p>
<p>This avoids conflicts while typing text.</p>
<h2>Interactive Demo</h2>
<p>Press <code>j</code> to scroll this text down.
Press <code>k</code> to scroll back up.</p>

<h2>Configuration</h2>
<pre><code class="language-json">{
  &quot;ux&quot;: true
}
</code></pre>
<p>Or, to enable keyboard navigation only:</p>
<pre><code class="language-json">{
  &quot;ux&quot;: { &quot;keyboard&quot;: true }
}
</code></pre>
<h2>JavaScript API</h2>
<pre><code class="language-typescript">// Install keyboard navigation manually
const cleanup = ontowave.ux.installKeyboardNav(() =&gt; {
  const navLinks = document.querySelectorAll('main &gt; p:last-of-type a');
  return {
    prev: navLinks[0]?.getAttribute('href') ?? undefined,
    next: navLinks[1]?.getAttribute('href') ?? undefined
  };
});

// Uninstall (e.g. on route change)
cleanup();
</code></pre>
<p>The function passed as a parameter is called on each <code>n</code> or <code>p</code> keypress to dynamically
determine the navigation URLs.</p>
<h2>Integration with the OntoWave Router</h2>
<p>When <code>ux: true</code> is set in the config, <code>installKeyboardNav</code> is called automatically
and synchronizes with the library’s internal router.</p>
