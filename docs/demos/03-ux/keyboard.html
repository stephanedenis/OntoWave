<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Raccourcis clavier</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/ontowave@latest/dist/ontowave.min.js"></script>
    <script src="/ontowave-ux.js"></script>
    <script>
        window.ontoWaveConfig = {
            baseUrl: "/demos/03-ux/",
            locales: ["fr", "en"],
            defaultLocale: "fr",
            sources: {
                fr: "keyboard.fr.md",
                en: "keyboard.en.md"
            },
            enablePrism: true
        };
    </script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
<h1>Raccourcis clavier</h1>
<p>OntoWave supporte des raccourcis clavier pour naviguer entre les pages sans souris.</p>
<h2>Raccourcis disponibles</h2>
<table>
<thead>
<tr>
<th style="text-align:left">Touche</th>
<th style="text-align:left">Action</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><kbd>j</kbd> ou <kbd>n</kbd></td>
<td style="text-align:left">Page suivante</td>
</tr>
<tr>
<td style="text-align:left"><kbd>k</kbd> ou <kbd>p</kbd></td>
<td style="text-align:left">Page précédente</td>
</tr>
</tbody>
</table>
<p>Les raccourcis sont désactivés lorsque vous tapez dans un champ de saisie.</p>
  </div>
  <div lang="en">
<h1>Keyboard Shortcuts</h1>
<p>OntoWave supports keyboard shortcuts to navigate between pages without a mouse.</p>
<h2>Available Shortcuts</h2>
<table>
<thead>
<tr>
<th style="text-align:left">Key</th>
<th style="text-align:left">Action</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><kbd>j</kbd> or <kbd>n</kbd></td>
<td style="text-align:left">Next page</td>
</tr>
<tr>
<td style="text-align:left"><kbd>k</kbd> or <kbd>p</kbd></td>
<td style="text-align:left">Previous page</td>
</tr>
</tbody>
</table>
<p>Shortcuts are disabled when typing in an input field.</p>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
