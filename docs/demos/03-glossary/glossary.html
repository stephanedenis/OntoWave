<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Démo Glossaire</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
      #layout { display: flex; flex: 1; }
      #app { flex: 1; padding: 1.5rem 2rem; max-width: 860px; }
      #sidebar { width: 280px; min-width: 200px; padding: 1rem; border-left: 1px solid #e2e8f0; background: #f8fafc; font-size: 0.875rem; }
      #sidebar h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin: 0 0 0.75rem; }
      .ow-term { text-decoration: underline dotted; text-underline-offset: 3px; text-decoration-color: #3b82f6; cursor: help; }
    </style>
</head>
<body>
    <div id="layout">
        <div id="app">Chargement…</div>
        <div id="sidebar">
            <h2>Définitions</h2>
            <p style="color:#94a3b8;font-size:0.8rem;">Cliquez sur un terme souligné pour voir sa définition ici.</p>
        </div>
    </div>

    <!-- Embed configuration so the app finds it without a server-side /config.json -->
    <script>
        // Set default hash route before OntoWave loads to avoid the early-return redirect
        if (!location.hash || location.hash === '#' || location.hash === '#/') {
            location.hash = '#/fr/glossary';
        }

        window.__ONTOWAVE_BUNDLE__ = {
            '/config.json': JSON.stringify({
                engine: 'v2',
                roots: [
                    { base: 'fr', root: '/demos/03-glossary' },
                    { base: 'en', root: '/demos/03-glossary' }
                ],
                glossary: {
                    enabled: true,
                    sources: ['/demos/03-glossary/glossary.fr.json'],
                    matching: {
                        caseSensitive: false,
                        wordBoundary: true,
                        firstOccurrenceOnly: false
                    },
                    exclude: {
                        elements: ['code', 'pre', 'kbd']
                    },
                    svg: { inline: false },
                    ui: {
                        underlineStyle: 'dotted',
                        clickBehavior: 'sidebar',
                        tooltip: {
                            showOnHover: true,
                            delay: 300,
                            maxWidth: 340
                        }
                    }
                }
            }),
            '/nav.yml': '[]',
            '/sitemap.json': '{"items":[]}',
            '/search-index.json': '[]'
        };
    </script>

    <!-- Local OntoWave build (updated with glossary feature) -->
    <script src="/ontowave.min.js"></script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
<h1>Glossaire — Dictionnaire avec soulignement et infobulle latérale</h1>
<p>Cette page démontre la fonctionnalité <strong>glossaire</strong> d’OntoWave. Les termes définis dans le dictionnaire chargé sont soulignés en pointillé. Au clic, leur définition apparaît dans le panneau latéral.</p>
<h2>Termes du glossaire en action</h2>
<p>L’<strong>UAF</strong> (Unified Architecture Framework) est le standard de l’OMG pour la modélisation d’architecture d’entreprise par vues et viewpoints.</p>
<p>La notion de <strong>Capabilité</strong> est centrale dans les cadres d’architecture modernes. Une Capabilité représente l’aptitude mesurable d’une organisation à atteindre un résultat défini.</p>
<p>La <strong>Gouvernance IT</strong> (ou Gouvernance des TI) encadre les mécanismes d’orientation et de pilotage des ressources informationnelles au sein d’une organisation.</p>
<p>Le cadre <strong>AEG</strong> (Architecture d’entreprise gouvernementale) constitue la directive SCT applicable aux organismes publics du Québec.</p>
<p>La loi <strong>LGGRI</strong> régit la gouvernance et la gestion des ressources informationnelles des organismes publics québécois.</p>
<h2>Comportement attendu</h2>
<ul>
<li>Les termes définis apparaissent <strong>soulignés en pointillé bleu</strong> (<code>text-decoration: underline dotted</code>)</li>
<li>Un <strong>clic</strong> sur un terme affiché dans le panneau latéral : terme, définition courte et lien vers la fiche complète</li>
<li>Le survol déclenche également une <strong>infobulle</strong> après un délai configurable (défaut : 300 ms)</li>
<li>Les termes dans les blocs <code>code</code> sont exclus : <code>UAF</code>, <code>Capabilité</code>, <code>LGGRI</code></li>
</ul>
<h2>Configuration</h2>
<p>La fonctionnalité est activée via <code>config.json</code> :</p>
<pre><code class="language-json">{
  &quot;glossary&quot;: {
    &quot;enabled&quot;: true,
    &quot;sources&quot;: [&quot;/demos/03-glossary/glossary.fr.json&quot;],
    &quot;matching&quot;: {
      &quot;caseSensitive&quot;: false,
      &quot;wordBoundary&quot;: true,
      &quot;firstOccurrenceOnly&quot;: false
    },
    &quot;exclude&quot;: { &quot;elements&quot;: [&quot;code&quot;, &quot;pre&quot;, &quot;kbd&quot;] },
    &quot;ui&quot;: {
      &quot;underlineStyle&quot;: &quot;dotted&quot;,
      &quot;clickBehavior&quot;: &quot;sidebar&quot;,
      &quot;tooltip&quot;: { &quot;showOnHover&quot;: true, &quot;delay&quot;: 300, &quot;maxWidth&quot;: 340 }
    }
  }
}
</code></pre>
<h2>Fusion de sources multiples (last-wins)</h2>
<p>OntoWave supporte plusieurs sources de glossaire. Le dernier fichier chargé écrase les entrées conflictuelles :</p>
<pre><code class="language-json">{
  &quot;sources&quot;: [
    &quot;https://culture.calme.gouv.qc.ca/glossary.fr.json&quot;,
    &quot;./glossary.fr.json&quot;
  ]
}
</code></pre>
<p>Clé de fusion : <code>term.toLowerCase()</code> + <code>alias.toLowerCase()</code>. Si deux sources définissent <strong>UAF</strong>, la seconde source prend la priorité (last-wins).</p>
<h2>Limite connue</h2>
<ul>
<li>Les SVG référencés via <code>&lt;img src=&quot;...&quot;&gt;</code> sont hors portée (DOM inaccessible)</li>
<li>Les SVG inline (Mermaid) peuvent être annotés avec <code>svg.inline: true</code>, mais le wrapping de <code>&lt;text&gt;</code> en <code>&lt;a&gt;</code> SVG peut affecter les coordonnées du layout</li>
</ul>
  </div>
  <div lang="en">
<h1>Glossary — Dictionary with dotted underline and sidebar tooltip</h1>
<p>This page demonstrates OntoWave’s <strong>glossary</strong> feature. Terms defined in the loaded dictionary are underlined with a dotted line. On click, their definition appears in the sidebar panel.</p>
<h2>Glossary Terms in Action</h2>
<p><strong>UAF</strong> (Unified Architecture Framework) is the OMG standard for enterprise architecture modelling through views and viewpoints.</p>
<p>The concept of <strong>Capability</strong> is central in modern architecture frameworks. A Capability represents an organisation’s measurable ability to achieve a defined outcome.</p>
<p><strong>IT Governance</strong> encompasses the mechanisms for directing and managing IT resources within an organisation.</p>
<h2>Expected Behaviour</h2>
<ul>
<li>Defined terms appear <strong>underlined with a dotted blue line</strong> (<code>text-decoration: underline dotted</code>)</li>
<li>A <strong>click</strong> on a term shows its definition in the sidebar panel: term, short definition and link to the full entry</li>
<li>Hovering also triggers a <strong>tooltip</strong> after a configurable delay (default: 300 ms)</li>
<li>Terms inside <code>code</code> blocks are excluded: <code>UAF</code>, <code>Capability</code>, <code>IT Governance</code></li>
</ul>
<h2>Configuration</h2>
<p>The feature is enabled via <code>config.json</code>:</p>
<pre><code class="language-json">{
  &quot;glossary&quot;: {
    &quot;enabled&quot;: true,
    &quot;sources&quot;: [&quot;/demos/03-glossary/glossary.en.json&quot;],
    &quot;matching&quot;: {
      &quot;caseSensitive&quot;: false,
      &quot;wordBoundary&quot;: true,
      &quot;firstOccurrenceOnly&quot;: false
    },
    &quot;exclude&quot;: { &quot;elements&quot;: [&quot;code&quot;, &quot;pre&quot;, &quot;kbd&quot;] },
    &quot;ui&quot;: {
      &quot;underlineStyle&quot;: &quot;dotted&quot;,
      &quot;clickBehavior&quot;: &quot;sidebar&quot;,
      &quot;tooltip&quot;: { &quot;showOnHover&quot;: true, &quot;delay&quot;: 300, &quot;maxWidth&quot;: 340 }
    }
  }
}
</code></pre>
<h2>Multi-source Merging (last-wins)</h2>
<p>OntoWave supports multiple glossary sources. The last file loaded overwrites conflicting entries:</p>
<pre><code class="language-json">{
  &quot;sources&quot;: [
    &quot;https://culture.example.org/glossary.en.json&quot;,
    &quot;./glossary.en.json&quot;
  ]
}
</code></pre>
<p>Merge key: <code>term.toLowerCase()</code> + <code>alias.toLowerCase()</code>. If two sources define <strong>UAF</strong>, the second source takes priority (last-wins).</p>
<h2>Known Limitations</h2>
<ul>
<li>SVG referenced via <code>&lt;img src=&quot;...&quot;&gt;</code> is out of scope (DOM is opaque)</li>
<li>Inline SVG (Mermaid) can be annotated with <code>svg.inline: true</code>, but wrapping <code>&lt;text&gt;</code> in SVG <code>&lt;a&gt;</code> may affect layout coordinates</li>
</ul>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
