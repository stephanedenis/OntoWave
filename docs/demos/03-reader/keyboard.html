<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave — Démo Raccourcis clavier</title>
</head>
<body>
    <script>
        window.ontoWaveConfig = {
            baseUrl: "/demos/03-reader/",
            locales: ["fr", "en"],
            defaultLocale: "fr",
            sources: {
                fr: "keyboard.fr.md",
                en: "keyboard.en.md"
            },
            enablePrism: true
        };
    </script>
    <script src="/ontowave.min.js"></script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
<h1>Raccourcis clavier</h1>
<p>Démonstration des raccourcis clavier de navigation d'OntoWave.</p>
<table>
<thead><tr><th>Touche</th><th>Action</th></tr></thead>
<tbody>
<tr><td><code>j</code></td><td>Faire défiler vers le bas</td></tr>
<tr><td><code>k</code></td><td>Faire défiler vers le haut</td></tr>
<tr><td><code>n</code> ou <code>→</code></td><td>Page suivante</td></tr>
<tr><td><code>p</code> ou <code>←</code></td><td>Page précédente</td></tr>
</tbody>
</table>
  </div>
  <div lang="en">
<h1>Keyboard Shortcuts</h1>
<p>Demonstration of OntoWave's keyboard navigation shortcuts.</p>
<table>
<thead><tr><th>Key</th><th>Action</th></tr></thead>
<tbody>
<tr><td><code>j</code></td><td>Scroll down</td></tr>
<tr><td><code>k</code></td><td>Scroll up</td></tr>
<tr><td><code>n</code> or <code>→</code></td><td>Next page</td></tr>
<tr><td><code>p</code> or <code>←</code></td><td>Previous page</td></tr>
</tbody>
</table>
  </div>
</noscript>
<!-- noscript:seo:end -->
</body>
</html>
