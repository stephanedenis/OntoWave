<body>
    <script src="https://cdn.jsdelivr.net/npm/ontowave@latest/dist/ontowave.min.js"></script>
    <script>
        window.ontoWaveConfig = {
            baseUrl: "/demos/01-base/",
            locales: ["fr", "en"],
            defaultLocale: "fr",
            sources: {
                fr: "plantuml.fr.md",
                en: "plantuml.en.md"
            },
            enablePlantUML: true,
            enablePrism: true
        };
    </script>

<!-- noscript:seo:start -->
<noscript>
  <div lang="fr">
<h1>Diagrammes PlantUML</h1>
<p>Démonstration du rendu PlantUML dans OntoWave : diagrammes de classes, d’activités et de composants.</p>
<h2>Diagramme de classes</h2>
<pre><code class="language-plantuml">@startuml
class OntoWave {
    +config: Config
    +init(): void
    +render(markdown: string): string
}

class Config {
    +roots: Root[]
    +i18n: I18nConfig
}

class Root {
    +base: string
    +root: string
}

OntoWave --&gt; Config
Config --&gt; Root
@enduml
</code></pre>
<h2>Diagramme d’activité</h2>
<pre><code class="language-plantuml">@startuml
start
:Chargement de la page;
:Lecture de la configuration;
if (Hash URL présent ?) then (oui)
    :Charge le fichier Markdown cible;
else (non)
    :Charge le fichier index par défaut;
endif
:Rendu HTML;
:Injection dans le DOM;
stop
@enduml
</code></pre>
<h2>Optimisations de rendu</h2>
<p>Les diagrammes PlantUML bénéficient de trois optimisations :</p>
<ul>
<li><strong>Lazy loading</strong> : les diagrammes hors viewport ne sont chargés que lorsqu’ils deviennent visibles (pré-chargement à 200 px de la limite du viewport), via <code>IntersectionObserver</code>.</li>
<li><strong>Cache intelligent</strong> : les SVG générés sont mis en cache en mémoire et dans <code>sessionStorage</code> avec un TTL de 30 minutes, évitant les requêtes réseau répétées lors de la navigation.</li>
<li><strong>Compression SVG</strong> : les SVG reçus sont compressés (suppression des espaces superflus entre balises) avant stockage.</li>
</ul>
<h2>Limite connue</h2>
<ul>
<li>PlantUML est rendu côté serveur via <a href="http://Kroki.io">Kroki.io</a> — les diagrammes nécessitent Internet</li>
<li>Les longs diagrammes peuvent dépasser la limite d’URL de PlantUML</li>
</ul>
  </div>
  <div lang="en">
<h1>PlantUML Diagrams</h1>
<p>Demonstration of PlantUML rendering in OntoWave: class diagrams, activity diagrams and component diagrams.</p>
<h2>Class Diagram</h2>
<pre><code class="language-plantuml">@startuml
class OntoWave {
    +config: Config
    +init(): void
    +render(markdown: string): string
}

class Config {
    +roots: Root[]
    +i18n: I18nConfig
}

class Root {
    +base: string
    +root: string
}

OntoWave --&gt; Config
Config --&gt; Root
@enduml
</code></pre>
<h2>Activity Diagram</h2>
<pre><code class="language-plantuml">@startuml
start
:Page loading;
:Read configuration;
if (URL hash present?) then (yes)
    :Load target Markdown file;
else (no)
    :Load default index file;
endif
:HTML rendering;
:Inject into DOM;
stop
@enduml
</code></pre>
<h2>Rendering Optimisations</h2>
<p>PlantUML diagrams benefit from three optimisations:</p>
<ul>
<li><strong>Lazy loading</strong>: diagrams outside the viewport are only fetched when they become visible (pre-loading 200 px before the viewport edge), using <code>IntersectionObserver</code>.</li>
<li><strong>Smart cache</strong>: generated SVGs are cached in memory and in <code>sessionStorage</code> with a 30-minute TTL, avoiding repeated network requests during navigation.</li>
<li><strong>SVG compression</strong>: received SVGs are compressed (removal of redundant whitespace between tags) before storage.</li>
</ul>
<h2>Known Limitations</h2>
<ul>
<li>PlantUML is rendered server-side via <a href="http://Kroki.io">Kroki.io</a> — diagrams require Internet access</li>
<li>Long diagrams may exceed PlantUML’s URL length limit</li>
</ul>
