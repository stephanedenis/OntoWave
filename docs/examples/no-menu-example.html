<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave - Sans Menu Flottant</title>
</head>
<body>
    <script>
    // Configuration OntoWave avec menu désactivé
    window.ontoWaveConfig = {
        locales: ["fr", "en"],
        defaultLocale: "fr",
        sources: {
            fr: "index.fr.md",
            en: "index.en.md"
        },
        
        // Configuration de l'interface utilisateur
        ui: {
            menu: false,      // ⭐ Menu flottant désactivé
            header: true,     // En-tête actif
            sidebar: true,    // Barre latérale active
            toc: true         // Table des matières active
        },
        
        // Plugins
        enablePrism: true,
        enableMermaid: true,
        enablePlantUML: true,
        enableSearch: true
    };
    </script>
    
    <!-- Chargement de OntoWave -->
    <script src="ontowave.min.js"></script>
</body>
</html>
