<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OntoWave - Micro-application pour sites statiques</title>
    <meta name="description" content="Micro-application JavaScript légère pour sites statiques avec support multilingue, Mermaid, PlantUML et Markdown">
    <style>
      /* === Base === */
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; padding: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'DejaVu Sans', Arial, sans-serif; background: #fff; color: #1a1a1a; }

      /* === Chrome masqué (mode minimal) === */
      #site-header { display: none; }
      #sidebar { display: none; }
      #toc { display: none; }

      /* === Contenu principal === */
      #layout { display: block; }
      #main { padding: 2rem max(2rem, 5vw); max-width: 900px; margin: 0 auto; }

      #app { line-height: 1.7; }
      #app h1, #app h2, #app h3 { margin-top: 1.5rem; }
      #app table { border-collapse: collapse; width: 100%; }
      #app th, #app td { border: 1px solid #e2e8f0; padding: 0.4rem 0.75rem; }
      #app th { background: #f8fafc; }
      #app pre { background: #f1f5f9; border-radius: 6px; padding: 1rem; overflow-x: auto; }
      #app code { background: #f1f5f9; border-radius: 3px; padding: 0.1em 0.3em; font-size: 0.875em; }
      #app pre code { background: none; padding: 0; }
      #app a { color: #0369a1; }
      #app a:hover { color: #0ea5e9; }
      #app blockquote { border-left: 4px solid #e2e8f0; margin-left: 0; padding-left: 1rem; color: #64748b; }

      /* === Menu flottant — icône vague === */
      #floating-menu {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 1000;
      }

      /* Bouton icône vague (cercle) */
      #floating-toggle {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: #e91e8c;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 10px rgba(233,30,140,0.35);
        padding: 0;
        transition: background 0.2s, box-shadow 0.2s;
      }
      #floating-toggle:hover { background: #c01a79; box-shadow: 0 4px 14px rgba(233,30,140,0.45); }
      #floating-toggle svg { display: block; }

      /* Panneau options (caché par défaut) */
      .ow-float-panel {
        display: none;
        margin-top: 0.5rem;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 0.5rem;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        min-width: 150px;
      }
      #floating-menu.open .ow-float-panel { display: block; }

      /* Sélecteur de langue */
      .ow-lang-btns {
        display: flex;
        gap: 0.4rem;
        padding: 0.25rem 0.25rem 0.5rem;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 0.25rem;
      }
      .ow-lang-btn {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        padding: 0.2rem 0.6rem;
        font-size: 0.85rem;
        cursor: pointer;
        text-decoration: none;
        color: #334155;
        font-weight: 500;
      }
      .ow-lang-btn:hover { background: #e2e8f0; }
      .ow-lang-btn.active { background: #fce4f3; border-color: #e91e8c; color: #a01060; }

      /* Barre UX dans le panneau flottant */
      #floating-menu .ow-ux-toolbar {
        display: flex !important;
        flex-direction: column !important;
        gap: 0.2rem !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
      }
      #floating-menu .ow-theme-btn {
        border-radius: 6px !important;
        text-align: left !important;
        width: 100%;
      }

      /* === Thèmes de lecture (surcharges) === */
      body.ow-theme-dark { background: #0f172a; color: #e2e8f0; }
      body.ow-theme-dark #app a { color: #38bdf8; }
      body.ow-theme-dark #app pre, body.ow-theme-dark #app code { background: #1e293b; }
      body.ow-theme-dark #app th { background: #1e293b; }
      body.ow-theme-dark #app th, body.ow-theme-dark #app td { border-color: #334155; }
      body.ow-theme-dark .ow-float-panel { background: #1e293b; border-color: #334155; }
      body.ow-theme-dark .ow-lang-btn { background: #334155; border-color: #475569; color: #cbd5e1; }
      body.ow-theme-sepia { background: #f5ede0; color: #3a2a1a; }
      body.ow-theme-sepia #app a { color: #7a4520; }
      body.ow-theme-sepia #app pre, body.ow-theme-sepia #app code { background: #ede6de; }
      body.ow-theme-sepia .ow-float-panel { background: #f4ede4; border-color: #c8b8a8; }

      /* === Utilitaires === */
      .hidden-by-config { display: none !important; }
      body.minimal #sidebar,
      body.minimal #toc,
      body.minimal #site-header { display: none !important; }

      /* === Responsive === */
      @media (max-width: 600px) {
        #main { padding: 1rem; }
        #floating-toggle { width: 40px; height: 40px; }
      }
    </style>
</head>
<body>
    <!-- Chrome masqué (mode minimal — éléments conservés pour compatibilité JS) -->
    <header id="site-header">
        <a id="brand" href="#fr/index">OntoWave</a>
    </header>
    <div id="layout">
        <nav id="sidebar"></nav>
        <main id="main">
            <div id="app"></div>
        </main>
        <aside id="toc"></aside>
    </div>

    <!-- Menu flottant : icône vague (cercle rose) en haut à gauche -->
    <div id="floating-menu">
      <button id="floating-toggle" aria-label="Menu OntoWave" aria-expanded="false">
        <!-- Icône vague OntoWave -->
        <svg viewBox="0 0 28 28" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 17 Q5 9 8 17 Q11 25 14 17 Q17 9 20 17 Q23 25 26 17" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ow-float-panel">
        <div class="ow-lang-btns" id="ow-lang-btns">
          <a class="ow-lang-btn" id="ow-lang-fr" href="#fr/index">FR</a>
          <a class="ow-lang-btn" id="ow-lang-en" href="#en/index">EN</a>
        </div>
        <!-- La barre UX (thème, PDF, notes) sera injectée ici par initUx -->
      </div>
    </div>

    <script>
        // i18n : redirect vers la langue par défaut si pas de hash
        (function() {
            if (!location.hash || location.hash === '#/' || location.hash === '#') {
                location.hash = '#fr/index';
            }
        }());

        // Menu flottant : toggle ouverture + mise à jour liens de langue
        (function() {
            var toggle = document.getElementById('floating-toggle');
            var menu = document.getElementById('floating-menu');
            if (toggle && menu) {
                toggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var open = menu.classList.toggle('open');
                    toggle.setAttribute('aria-expanded', String(open));
                });
                document.addEventListener('click', function(e) {
                    if (!menu.contains(e.target)) {
                        menu.classList.remove('open');
                        toggle.setAttribute('aria-expanded', 'false');
                    }
                });
            }

            // Mettre à jour les liens de langue pour refléter la page courante
            function updateLangLinks() {
                var hash = (location.hash || '').replace(/^#\/?(?:fr|en)\//, '') || 'index';
                var isEn = (location.hash || '').indexOf('#en/') === 0;
                var isFr = (location.hash || '').indexOf('#fr/') === 0;
                var langFr = document.getElementById('ow-lang-fr');
                var langEn = document.getElementById('ow-lang-en');
                if (langFr) { langFr.href = '#fr/' + hash; langFr.className = 'ow-lang-btn' + (isFr ? ' active' : ''); }
                if (langEn) { langEn.href = '#en/' + hash; langEn.className = 'ow-lang-btn' + (isEn ? ' active' : ''); }
            }
            window.addEventListener('hashchange', updateLangLinks);
            updateLangLinks();
        }());
    </script>
    <script src="/ontowave.min.js"></script>

<h1>OntoWave <a href="https://github.com/stephanedenis/OntoWave/blob/main/CHANGELOG.md">v1.0.25</a></h1>
<p>Micro-application JavaScript légère (~245KB, ~85KB gzippé) pour sites statiques avec support multilingue, coloration syntaxique, formules mathématiques et diagrammes.</p>

<ul>
<li><strong>Traitement Markdown</strong>: Analyse et rendu Markdown avec support alignements tableaux</li>

<li><strong>Coloration syntaxique</strong>: Blocs de code avec highlight.js (multi-langages)</li>
<li><strong>Support Multilingue</strong>: Internationalisation (i18n) intégrée avec détection automatique langue</li>
<li><strong>Diagrammes Mermaid</strong>: Rendu de flowcharts, sequence, class diagrams en SVG inline</li>
<li><strong>Support PlantUML</strong>: Diagrammes UML via <a href="http://Kroki.io">Kroki.io</a> avec rendu SVG inline</li>
<li><strong>Fichiers .puml</strong>: Chargement direct de fichiers PlantUML</li>
<li><strong>Cache SVG Intelligent</strong>: Cache in-memory avec TTL 5min pour performance optimale</li>
<li><strong>Modes d’Affichage</strong>: Normal, Split View (source + rendu), Source-only</li>
<li><strong>Routing SPA</strong>: Navigation hash-based sans rechargement de page</li>
<li><strong>Léger</strong>: ~245KB minifié (~85KB gzippé), aucune dépendance runtime</li>
<li><strong>Configuration Simple</strong>: Script à intégrer avec initialisation automatique</li>

<h1>OntoWave <a href="https://github.com/stephanedenis/OntoWave/blob/main/CHANGELOG.md">v1.0.25</a></h1>
<p>Lightweight JavaScript micro-application (~245KB, ~85KB gzipped) for static sites with multilingual support, syntax highlighting, math formulas and diagrams.</p>
<h2>Features</h2>
<ul>
<li><strong>Markdown Processing</strong>: Parse and render Markdown with table alignments support</li>
<li><strong>Math Formulas</strong>: KaTeX (LaTeX) support for inline and block equations</li>
<li><strong>Syntax Highlighting</strong>: Code blocks with highlight.js (multi-language)</li>
<li><strong>Multilingual Support</strong>: Built-in internationalization (i18n) with auto language detection</li>
<li><strong>Mermaid Diagrams</strong>: Render flowcharts, sequence diagrams, class diagrams as inline SVG</li>
<li><strong>PlantUML Support</strong>: UML diagrams via <a href="http://Kroki.io">Kroki.io</a> with inline SVG rendering</li>
<li><strong>.puml Files</strong>: Direct PlantUML file loading</li>
<li><strong>Smart SVG Cache</strong>: In-memory cache with 5min TTL for optimal performance</li>
<li><strong>View Modes</strong>: Normal, Split View (source + render), Source-only</li>
<li><strong>SPA Routing</strong>: Hash-based navigation without page reload</li>
<li><strong>Lightweight</strong>: ~245KB minified (~85KB gzipped), no runtime dependencies</li>
<li><strong>Simple Configuration</strong>: Drop-in script with automatic initialization</li>
</ul>
<h3>🧪 Interactive Demonstrations</h3>
<p>Explore OntoWave v1.0.25 through <strong>interactive and tested demos</strong>:</p>
